name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main branch
        run: |
          BRANCHES=$(git branch -r --contains ${{ github.ref }})
          echo "Branches containing this tag:"
          echo "$BRANCHES"

          if ! echo "$BRANCHES" | grep -q 'origin/main'; then
            echo "❌ Error: Tag must be on main branch"
            echo "Current branches: $BRANCHES"
            exit 1
          fi
          echo "✅ Tag is on main branch"

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Release version: $VERSION"

  create-github-release:
    runs-on: ubuntu-latest
    needs: verify-tag
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found, using all commits"
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            echo "Generating changelog from $PREVIOUS_TAG to ${{ github.ref_name }}"
            CHANGELOG=$(git log $PREVIOUS_TAG..${{ github.ref_name }} --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Save to file to handle multiline
          echo "$CHANGELOG" > /tmp/changelog.txt
          echo "changelog_file=/tmp/changelog.txt" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          name: "Release ${{ needs.verify-tag.outputs.version }}"
          body: |
            ## 🚀 Release ${{ needs.verify-tag.outputs.version }}

            This extension talks to the official **nnInteractive** backend (v2).
            There is no longer a bundled server — run the official server, or use the
            built-in local compute mode.

            ### Installation

            **3D Slicer extension:** install *nnInteractive* from the Slicer Extensions Manager
            (or clone this repo and add `slicer_plugin/` via *Edit → Application Settings → Modules*).

            **Server (optional — for remote compute):**
            ```bash
            pip install nnInteractive[server]
            nninteractive-server --model-dir /path/to/nnInteractive_v1.0 --host 0.0.0.0 --port 1527
            ```

            ### Changes

            $(cat ${{ steps.changelog.outputs.changelog_file }})

            ---
            **Full Changelog**: https://github.com/${{ github.repository }}/compare/v${{ needs.verify-tag.outputs.version }}...HEAD
          draft: false
          prerelease: false
