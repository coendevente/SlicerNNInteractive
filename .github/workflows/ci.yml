name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Byte-compile the Slicer plugin
        run: |
          # The plugin imports the 3D Slicer runtime (slicer / qt / vtk), which is
          # only available inside Slicer, so CI can only syntax-check it here.
          # The full self-test runs inside Slicer (see slicer_plugin/.../Testing/Python).
          python -m compileall -q slicer_plugin/SlicerNNInteractive
          echo "✅ Plugin byte-compiled successfully"
